services:
  jellyfin-renamer:
    image: ghcr.io/jellystrm/renamer:latest
    container_name: jellyfin-renamer
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - /path/to/your/movies:/movies
      - /path/to/your/tvshows:/tv
      - /path/to/your/appdata:/appdata
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - MOVIE_DIR=/movies
      - TV_DIR=/tv
      - APPDATA_DIR=/appdata
